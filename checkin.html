<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC Stiens VR1 — Check-in</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0c0c0e;--card:#1c1c22;--line:#34343f;--txt:#f4f4f6;--muted:#b7b7c4;
    --gold:#F28C00;--yellow:#FFD200;--green:#37d67a;--red:#ff7a7a;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--txt);
    background:radial-gradient(900px 300px at 50% -120px,rgba(242,140,0,.16),transparent 70%),
      linear-gradient(160deg,#0c0c0e,#141416 60%,#0c0c0e);min-height:100vh}
  .wrap{max-width:460px;margin:0 auto;padding:26px 18px 60px}
  header{text-align:center;margin-bottom:8px}
  header h1{font-size:20px;margin:8px 0 2px}
  header h1 span{color:var(--gold)}
  header p{color:var(--muted);font-size:13px;margin:0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 16px 6px;margin-top:16px}
  .q{margin-bottom:16px}
  .q .lbl{font-size:15px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .q .lbl .em{font-size:20px}
  .scale{display:flex;gap:7px}
  .scale button{flex:1;aspect-ratio:1/1;border-radius:12px;border:1px solid var(--line);
    background:var(--bg);color:var(--txt);font-size:22px;cursor:pointer;transition:.12s;padding:0}
  .scale button:hover{border-color:var(--gold)}
  .scale button.sel{background:linear-gradient(150deg,var(--gold),var(--yellow));color:#1a1200;border-color:var(--gold);transform:scale(1.05)}
  .scalenums{display:flex;gap:7px;margin-top:3px}
  .scalenums span{flex:1;text-align:center;font-size:10px;color:var(--muted)}
  .q input[type=text],.q input[type=number]{width:100%;background:var(--bg);color:var(--txt);
    border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px}
  .q input:focus{border-color:var(--gold);outline:none}
  .submit{width:100%;padding:14px;border:none;border-radius:12px;background:var(--gold);color:#1a1200;
    font-size:16px;font-weight:800;cursor:pointer;margin-top:6px}
  .submit:disabled{opacity:.5;cursor:default}
  .note{color:var(--muted);font-size:12px;text-align:center;line-height:1.5;margin-top:16px}
  .done{text-align:center;padding:40px 10px}
  .done .big{font-size:52px}
  .done h2{color:var(--green);margin:12px 0 4px}
  .err{color:var(--red);text-align:center;font-size:14px;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🌡️ <span>S.C. Stiens</span> VR1 — Check-in</h1>
    <p id="sub">Je maandelijkse check-in</p>
  </header>
  <div id="app"></div>
  <p class="note">Dit is een korte, vertrouwelijke check-in over hoe je je voelt. Alleen de staf ziet de resultaten.
    Voel je je langere tijd niet lekker? Trek aan de bel bij de staf of iemand die je vertrouwt.</p>
</div>

<script>
const SUPA_URL="https://dvaheqgjjksynlqvgjla.supabase.co";
const SUPA_KEY="sb_publishable_IWI8mpvtljLfmZ99W8_xvA_XzMv64_I";
const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);

const QUESTIONS=[
  {k:"mood",  em:"😊", lbl:"Hoe is je stemming?",       lo:"slecht", hi:"top"},
  {k:"sleep", em:"😴", lbl:"Hoe slaap je de laatste tijd?", lo:"slecht", hi:"top"},
  {k:"calm",  em:"🧘", lbl:"Hoe rustig/ontspannen voel je je?", lo:"gestrest", hi:"heel rustig"},
  {k:"energy",em:"⚡", lbl:"Hoeveel energie heb je?",     lo:"leeg", hi:"vol energie"},
  {k:"muscle",em:"💪", lbl:"Hoe fris voelen je spieren/lichaam?", lo:"stijf/pijn", hi:"helemaal fris"},
];
const FACES={1:"😣",2:"😟",3:"😐",4:"🙂",5:"😄"};
const params=new URLSearchParams(location.search);
const token=params.get("p")||"";
const naam=params.get("naam")||"";
const answers={};

function render(){
  document.getElementById("sub").textContent = naam ? ("Hoi "+naam+" — je maandelijkse check-in") : "Je maandelijkse check-in";
  if(!token){ document.getElementById("app").innerHTML='<div class="card"><p class="err">Geen geldige persoonlijke link. Vraag de staf om jouw eigen check-in-link.</p></div>'; return; }
  const app=document.getElementById("app");
  app.innerHTML=`<div class="card">${QUESTIONS.map(q=>`
    <div class="q" data-k="${q.k}">
      <div class="lbl"><span class="em">${q.em}</span> ${q.lbl}</div>
      <div class="scale">${[1,2,3,4,5].map(v=>`<button type="button" data-v="${v}" onclick="pick('${q.k}',${v},this)">${FACES[v]}</button>`).join("")}</div>
      <div class="scalenums"><span>1 · ${q.lo}</span><span></span><span></span><span></span><span>5 · ${q.hi}</span></div>
    </div>`).join("")}
    <div class="q">
      <div class="lbl"><span class="em">🩹</span> Heb je een blessure? Zo ja, waaraan?</div>
      <input id="injury" type="text" placeholder="Bijv. enkel, hamstring, knie… (laat leeg als je fit bent)">
    </div>
    <div class="q">
      <div class="lbl"><span class="em">⏱️</span> Geschat herstel (weken)</div>
      <input id="recovery" type="number" min="0" step="1" placeholder="0 = geen / al fit">
    </div>
    <button class="submit" id="submitBtn" disabled onclick="submitCheckin()">Versturen</button>
    <div id="err"></div>
  </div>`;
}
function pick(k,v,btn){
  answers[k]=v;
  btn.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");
  document.getElementById("submitBtn").disabled = Object.keys(answers).length<QUESTIONS.length;
}
async function submitCheckin(){
  const btn=document.getElementById("submitBtn"); btn.disabled=true; btn.textContent="Versturen…";
  const today=new Date().toISOString().slice(0,10);
  const injury=(document.getElementById("injury").value||"").trim();
  const recEl=document.getElementById("recovery"); const recovery=(recEl.value!=="")?+recEl.value:"";
  const vals=Object.assign({},answers,{injury:injury,recovery:recovery});
  const {error}=await sb.from("mood_checkins").insert({token:token, player:naam||null, date:today, vals:vals});
  if(error){
    document.getElementById("err").innerHTML='<p class="err">Er ging iets mis bij het versturen. Probeer het straks nog eens.</p>';
    btn.disabled=false; btn.textContent="Versturen"; return;
  }
  const avg=QUESTIONS.reduce((a,q)=>a+(answers[q.k]||0),0)/QUESTIONS.length;
  document.getElementById("app").innerHTML=`<div class="done">
    <div class="big">${FACES[Math.round(avg)]}</div>
    <h2>Bedankt${naam?(", "+naam):""}!</h2>
    <p class="note">Je check-in is verstuurd. Tot de volgende keer 💪🧡</p>
  </div>`;
}
render();
</script>
</body>
</html>
